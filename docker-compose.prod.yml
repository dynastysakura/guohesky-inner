services:
  nocobase:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: nocobase
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - nocobase-storage:/app/storage
    ports:
      - "127.0.0.1:13000:13000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: nocobase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nocobase}
      POSTGRES_USER: ${DB_USER:-nocobase}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: postgres -c wal_level=logical
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nocobase}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nocobase-storage:
  pg-data:
